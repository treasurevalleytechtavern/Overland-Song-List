<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="2100" viewBox="0 0 1500 2100" role="img" aria-labelledby="title desc">
  <title id="title">Overland Bar karaoke song search QR promo</title>
  <desc id="desc">A five by seven portrait Overland Bar karaoke promo graphic with a blank square reserved for a QR code.</desc>
  <defs>
    <radialGradient id="cyanGlow" cx="18%" cy="11%" r="48%">
      <stop offset="0%" stop-color="#31e8ff" stop-opacity="0.24"/>
      <stop offset="58%" stop-color="#31e8ff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#31e8ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="redGlow" cx="78%" cy="7%" r="46%">
      <stop offset="0%" stop-color="#ff4662" stop-opacity="0.22"/>
      <stop offset="62%" stop-color="#ff4662" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ff4662" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="surface" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#161616"/>
      <stop offset="58%" stop-color="#090909"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="barLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#31e8ff"/>
      <stop offset="50%" stop-color="#ff4662"/>
      <stop offset="100%" stop-color="#ffd12a"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
    <filter id="cyanTextGlow" x="-20%" y="-40%" width="140%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#31e8ff" flood-opacity="0.55"/>
    </filter>
    <filter id="whiteTextGlow" x="-16%" y="-22%" width="132%" height="144%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#ffffff" flood-opacity="0.22"/>
    </filter>
    <filter id="goldGlow" x="-28%" y="-45%" width="156%" height="190%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#ffd12a" flood-opacity="0.55"/>
      <feDropShadow dx="0" dy="0" stdDeviation="20" flood-color="#ffd12a" flood-opacity="0.25"/>
    </filter>
    <filter id="pinkGlow" x="-28%" y="-45%" width="156%" height="190%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#ff4662" flood-opacity="0.58"/>
      <feDropShadow dx="0" dy="0" stdDeviation="20" flood-color="#31e8ff" flood-opacity="0.22"/>
    </filter>
    <filter id="diceGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="9" flood-color="#31e8ff" flood-opacity="0.9"/>
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#ff4662" flood-opacity="0.55"/>
    </filter>
    <pattern id="tinyGrid" width="54" height="54" patternUnits="userSpaceOnUse">
      <path d="M54 0H0V54" fill="none" stroke="#303030" stroke-width="1" stroke-opacity="0.22"/>
    </pattern>
  </defs>

  <rect width="1500" height="2100" fill="#050505"/>
  <rect width="1500" height="2100" fill="url(#cyanGlow)"/>
  <rect width="1500" height="2100" fill="url(#redGlow)"/>
  <rect width="1500" height="2100" fill="url(#tinyGrid)" opacity="0.52"/>

  <rect x="72" y="72" width="1356" height="1956" rx="8" fill="url(#surface)" stroke="#303030" stroke-width="3" filter="url(#softShadow)"/>
  <rect x="72" y="72" width="1356" height="14" fill="url(#barLine)"/>
  <rect x="112" y="112" width="1276" height="1876" rx="8" fill="none" stroke="#31e8ff" stroke-width="2" stroke-opacity="0.18"/>

  <image href="overland-bar-logo-wide.png" x="445" y="92" width="610" height="203" preserveAspectRatio="xMidYMid meet"/>

  <text x="750" y="332" text-anchor="middle" font-family="'Trebuchet MS', Arial, Helvetica, sans-serif" font-size="36" font-weight="700" letter-spacing="0" fill="#31e8ff" filter="url(#cyanTextGlow)">Good Times Karaoke</text>

  <text x="750" y="456" text-anchor="middle" font-family="'Trebuchet MS', Arial, Helvetica, sans-serif" font-size="96" font-weight="900" letter-spacing="0" fill="#f2f2f2" filter="url(#whiteTextGlow)">
    <tspan x="750" dy="0">Don't know</tspan>
    <tspan x="750" dy="98">what to sing?</tspan>
  </text>

  <text x="750" y="700" text-anchor="middle" font-family="'Trebuchet MS', Arial, Helvetica, sans-serif" font-size="104" font-weight="900" letter-spacing="0" fill="#ffd12a" filter="url(#goldGlow)">We got you.</text>

  <text x="750" y="822" text-anchor="middle" font-family="'Trebuchet MS', Arial, Helvetica, sans-serif" font-size="54" font-weight="700" letter-spacing="0" fill="#f2f2f2">
    <tspan x="750" dy="0">Search thousands of songs in seconds.</tspan>
    <tspan x="750" dy="72" fill="#b9b9b9">Yes, even that song you forgot existed.</tspan>
  </text>

  <g transform="translate(238 955)">
    <line x1="0" y1="34" x2="410" y2="34" stroke="#303030" stroke-width="3"/>
    <text x="512" y="46" text-anchor="middle" font-family="'Trebuchet MS', Arial, Helvetica, sans-serif" font-size="40" font-weight="900" fill="#ff4662" filter="url(#whiteTextGlow)">OR</text>
    <line x1="614" y1="34" x2="1024" y2="34" stroke="#303030" stroke-width="3"/>
  </g>

  <g transform="translate(430 1044)" filter="url(#goldGlow)">
    <rect x="0" y="0" width="640" height="108" rx="8" fill="#241f0b" stroke="#ffd12a" stroke-width="3"/>
    <rect x="3" y="3" width="634" height="102" rx="7" fill="#ffd12a" fill-opacity="0.08"/>
    <g transform="translate(74 17) rotate(-14 37 37)" filter="url(#diceGlow)">
      <rect x="2" y="2" width="70" height="70" rx="10" fill="#f2f2f2"/>
      <rect x="7" y="7" width="60" height="60" rx="8" fill="#ffffff"/>
      <circle cx="23" cy="23" r="6" fill="#050505"/>
      <circle cx="51" cy="23" r="6" fill="#050505"/>
      <circle cx="37" cy="37" r="6" fill="#050505"/>
      <circle cx="23" cy="51" r="6" fill="#050505"/>
      <circle cx="51" cy="51" r="6" fill="#050505"/>
    </g>
    <text x="374" y="70" text-anchor="middle" font-family="'Trebuchet MS', Arial, Helvetica, sans-serif" font-size="39" font-weight="900" letter-spacing="0" fill="#f2f2f2">LET CHANCE DECIDE</text>
  </g>

  <g transform="translate(504 1226)">
    <rect x="0" y="0" width="492" height="492" rx="8" fill="#080808" stroke="#303030" stroke-width="3"/>
    <rect x="42" y="42" width="408" height="408" rx="8" fill="#f2f2f2"/>
    <rect x="68" y="68" width="356" height="356" rx="4" fill="#ffffff" stroke="#d9d9d9" stroke-width="3"/>
    <path d="M52 42h110M42 42v110M340 42h110M450 42v110M42 340v110M42 450h110M450 340v110M340 450h110" fill="none" stroke="#31e8ff" stroke-width="10" stroke-linecap="round" opacity="0.84"/>
  </g>

  <g transform="translate(130 1728)">
    <rect x="0" y="0" width="1240" height="120" rx="8" fill="#070707" stroke="#ff4662" stroke-width="3" filter="url(#pinkGlow)"/>
    <text x="180" y="77" text-anchor="middle" font-family="'Trebuchet MS', Arial, Helvetica, sans-serif" font-size="48" font-weight="900" letter-spacing="10" fill="#f2f2f2" filter="url(#whiteTextGlow)">SCAN</text>
    <path d="M318 60h100" stroke="#31e8ff" stroke-width="8" stroke-linecap="round"/>
    <path d="M406 42l26 18-26 18" fill="none" stroke="#31e8ff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="560" y="77" text-anchor="middle" font-family="'Trebuchet MS', Arial, Helvetica, sans-serif" font-size="48" font-weight="900" letter-spacing="10" fill="#f2f2f2" filter="url(#whiteTextGlow)">PICK</text>
    <path d="M685 60h100" stroke="#ff4662" stroke-width="8" stroke-linecap="round"/>
    <path d="M773 42l26 18-26 18" fill="none" stroke="#ff4662" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="1020" y="77" text-anchor="middle" font-family="'Trebuchet MS', Arial, Helvetica, sans-serif" font-size="44" font-weight="900" letter-spacing="5" fill="#f2f2f2" filter="url(#whiteTextGlow)">TELL THE DJ</text>
  </g>

  <g transform="translate(1245 460)">
    <circle cx="0" cy="0" r="74" fill="#070707" stroke="#ff4662" stroke-width="2" filter="url(#pinkGlow)"/>
    <text x="0" y="-31" text-anchor="middle" font-family="'Trebuchet MS', Arial, Helvetica, sans-serif" font-size="24" font-weight="900" letter-spacing="1" fill="#31e8ff">NO</text>
    <text x="0" y="-3" text-anchor="middle" font-family="'Trebuchet MS', Arial, Helvetica, sans-serif" font-size="24" font-weight="900" letter-spacing="1" fill="#31e8ff">JUDGMENT.</text>
    <text x="0" y="28" text-anchor="middle" font-family="'Trebuchet MS', Arial, Helvetica, sans-serif" font-size="24" font-weight="900" letter-spacing="1" fill="#f2f2f2">JUST</text>
    <text x="0" y="56" text-anchor="middle" font-family="'Trebuchet MS', Arial, Helvetica, sans-serif" font-size="24" font-weight="900" letter-spacing="1" fill="#f2f2f2">VIBES.</text>
  </g>

  <g transform="translate(205 1878)">
    <text x="0" y="0" font-family="'Trebuchet MS', Arial, Helvetica, sans-serif" font-size="29" font-weight="900" letter-spacing="5" fill="#f2f2f2">GOOD SONGS</text>
    <circle cx="286" cy="-10" r="6" fill="#ff4662"/>
    <text x="346" y="0" font-family="'Trebuchet MS', Arial, Helvetica, sans-serif" font-size="29" font-weight="900" letter-spacing="5" fill="#f2f2f2">GOOD PEOPLE</text>
    <circle cx="714" cy="-10" r="6" fill="#ff4662"/>
    <text x="774" y="0" font-family="'Trebuchet MS', Arial, Helvetica, sans-serif" font-size="29" font-weight="900" letter-spacing="5" fill="#f2f2f2">BETTER MEMORIES</text>
  </g>

  <text x="750" y="1948" text-anchor="middle" font-family="'Trebuchet MS', Arial, Helvetica, sans-serif" font-size="42" font-style="italic" font-weight="700" fill="#ff4662" filter="url(#pinkGlow)">The mic is yours. Let's hear it!</text>
</svg>
